<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Changer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <h1>Color Changer</h1>
    <label for="color-input" class="visually-hidden">Choose color:</label>
    <input id="color-input" type="color" title="Choose color">
    <button id="apply-btn">Apply</button>
    <button id="random-btn">Random</button>
    <div id="box"></div>
  </div>
  <script src="script.js"></script>
</body>
</html>
